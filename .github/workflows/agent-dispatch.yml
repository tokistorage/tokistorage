name: Agent Dispatch

on:
  push:
    paths:
      - 'agent/request.json'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: false
        default: 'fetch_project'
      inbox_text:
        description: 'Inbox text (voice memo)'
        required: false
        default: ''
      place:
        description: 'Location address'
        required: false
        default: ''
      lat:
        description: 'Latitude'
        required: false
        default: ''
      lng:
        description: 'Longitude'
        required: false
        default: ''
      weather:
        description: 'Weather (e.g. 快晴 10℃)'
        required: false
        default: ''
      date:
        description: 'Date (e.g. 2026/03/14)'
        required: false
        default: ''
      time:
        description: 'Time (e.g. 19:20:36 GMT+9)'
        required: false
        default: ''

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse request
        id: parse
        run: python3 $GITHUB_WORKSPACE/agent/actions/parse_request.py
        env:
          INBOX_TEXT: ${{ github.event.inputs.inbox_text }}
          PLACE: ${{ github.event.inputs.place }}
          LAT: ${{ github.event.inputs.lat }}
          LNG: ${{ github.event.inputs.lng }}
          WEATHER: ${{ github.event.inputs.weather }}
          DATE_INPUT: ${{ github.event.inputs.date }}
          TIME_INPUT: ${{ github.event.inputs.time }}
          ACTION_INPUT: ${{ github.event.inputs.action }}

      - name: fetch_project
        if: steps.parse.outputs.action == 'fetch_project'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -s -H "Authorization: bearer $PAT_TOKEN" \
            -H "Content-Type: application/json" -X POST \
            -d '{"query":"{ user(login: \"tokistorage\") { projectV2(number: 2) { title items(first: 100) { nodes { id content { ... on Issue { title state number url } ... on DraftIssue { title } } fieldValues(first:5){ nodes { ... on ProjectV2ItemFieldSingleSelectValue { name field { ... on ProjectV2FieldCommon { name } } } } } } } } } }"}' \
            https://api.github.com/graphql > /tmp/result.json
          python3 -c "import json; d=json.load(open('/tmp/result.json')); print('✅ fetch_project 完了:', len(d['data']['user']['projectV2']['items']['nodes']), '件')"

      - name: delete_project_items
        if: steps.parse.outputs.action == 'delete_project_items'
        run: python3 $GITHUB_WORKSPACE/agent/actions/delete_project_items.py
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          PAYLOAD: ${{ steps.parse.outputs.payload }}

      - name: update_task
        if: steps.parse.outputs.action == 'update_task'
        run: python3 $GITHUB_WORKSPACE/agent/actions/update_task.py
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          PAYLOAD: ${{ steps.parse.outputs.payload }}

      - name: create_issue
        if: steps.parse.outputs.action == 'create_issue'
        run: python3 $GITHUB_WORKSPACE/agent/actions/create_issue.py
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          PAYLOAD: ${{ steps.parse.outputs.payload }}

      - name: write_file
        if: steps.parse.outputs.action == 'write_file'
        run: python3 $GITHUB_WORKSPACE/agent/actions/write_file.py
        env:
          PAYLOAD: ${{ steps.parse.outputs.payload }}

      - name: write_memory
        if: steps.parse.outputs.action == 'write_memory'
        run: python3 $GITHUB_WORKSPACE/agent/actions/write_memory.py
        env:
          PAYLOAD: ${{ steps.parse.outputs.payload }}

      - name: publish_essay
        if: steps.parse.outputs.action == 'publish_essay'
        run: python3 $GITHUB_WORKSPACE/agent/actions/publish_essay.py
        env:
          PAYLOAD: ${{ steps.parse.outputs.payload }}

      - name: reorder_tasks
        if: steps.parse.outputs.action == 'reorder_tasks'
        run: python3 $GITHUB_WORKSPACE/agent/actions/reorder_tasks.py
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          PAYLOAD: ${{ steps.parse.outputs.payload }}

      - name: add_comment
        if: steps.parse.outputs.action == 'add_comment'
        run: python3 $GITHUB_WORKSPACE/agent/actions/add_comment.py
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          PAYLOAD: ${{ steps.parse.outputs.payload }}

      - name: close_issue
        if: steps.parse.outputs.action == 'close_issue'
        run: python3 $GITHUB_WORKSPACE/agent/actions/close_issue.py
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          PAYLOAD: ${{ steps.parse.outputs.payload }}

      - name: fetch_inbox
        if: steps.parse.outputs.action == 'fetch_inbox'
        run: python3 $GITHUB_WORKSPACE/agent/actions/fetch_inbox.py
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BUSINESS_EMAIL: ${{ secrets.BUSINESS_EMAIL }}
          BUSINESS_APP_PASSWORD: ${{ secrets.BUSINESS_APP_PASSWORD }}
          PAYLOAD: ${{ steps.parse.outputs.payload }}

      - name: send_email
        if: steps.parse.outputs.action == 'send_email'
        run: python3 $GITHUB_WORKSPACE/agent/actions/send_email.py
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PAYLOAD: ${{ steps.parse.outputs.payload }}

      - name: write_inbox
        if: steps.parse.outputs.action == 'write_inbox'
        run: python3 $GITHUB_WORKSPACE/agent/actions/write_inbox.py
        env:
          PAYLOAD: ${{ steps.parse.outputs.payload }}

      - name: archive_inbox
        if: steps.parse.outputs.action == 'archive_inbox'
        run: python3 $GITHUB_WORKSPACE/agent/actions/archive_inbox.py
        env:
          PAYLOAD: ${{ steps.parse.outputs.payload }}

      - name: morning_briefing
        if: steps.parse.outputs.action == 'morning_briefing'
        run: python3 $GITHUB_WORKSPACE/agent/morning_briefing.py
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: write_relations
        if: steps.parse.outputs.action == 'write_relations'
        run: python3 $GITHUB_WORKSPACE/agent/actions/write_relations.py
        env:
          PAYLOAD: ${{ steps.parse.outputs.payload }}

      - name: fetch_news
        if: steps.parse.outputs.action == 'fetch_news'
        run: python3 $GITHUB_WORKSPACE/agent/actions/fetch_news.py
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          PAYLOAD: ${{ steps.parse.outputs.payload }}

      - name: create_repo
        if: steps.parse.outputs.action == 'create_repo'
        run: python3 $GITHUB_WORKSPACE/agent/actions/create_repo.py
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          PAYLOAD: ${{ steps.parse.outputs.payload }}

      - name: run_skill
        if: steps.parse.outputs.action == 'run_skill'
        run: python3 $GITHUB_WORKSPACE/agent/actions/run_skill.py
        env:
          PAYLOAD: ${{ steps.parse.outputs.payload }}

      - name: Save result to private repo
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          ACTION: ${{ steps.parse.outputs.action }}
        run: bash $GITHUB_WORKSPACE/agent/save_result.sh
